server {
    listen 80 default_server;
    server_name _;

    root /var/www/tresamigos/apps/web/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        alias /var/www/tresamigos/apps/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 15M;
}

# Do NOT add: location /assets/ { alias /var/www/tresamigos/assets; }
# Vite build JS/CSS also lives under /assets/ and would break.
#
# Optional CMS uploads only (uncomment if uploads 404):
