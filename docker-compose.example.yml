# Kopieer naar docker-compose.yml of gebruik: docker compose -f docker-compose.example.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tresamigos
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: tresamigos
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
